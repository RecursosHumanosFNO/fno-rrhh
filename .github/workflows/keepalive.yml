name: Keep Supabase Alive

# Mantiene despierto el proyecto de Supabase (plan free pausa tras 7 días
# de inactividad). Hace un ping diario al endpoint /api/keepalive.

on:
  schedule:
    # Todos los días a las 12:00 UTC (09:00 hora Argentina)
    - cron: '0 12 * * *'
  workflow_dispatch: {} # Permite ejecutarlo manualmente desde la pestaña Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping keepalive endpoint
        run: |
          echo "Pinging keepalive endpoint..."
          response=$(curl -s -o /dev/null -w "%{http_code}" https://portalfundacion.vercel.app/api/keepalive)
          echo "HTTP status: $response"
          if [ "$response" != "200" ]; then
            echo "::warning::Keepalive devolvió $response (esperado 200)"
          fi
